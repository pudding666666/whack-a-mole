<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦕 恐龙跑酷</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
        }
        
        h1 {
            color: #fff;
            font-size: 24px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00d9ff, 0 0 20px #00d9ff;
        }
        
        #gameContainer {
            position: relative;
            width: 800px;
            height: 300px;
            background: linear-gradient(to bottom, #f7f7f7 0%, #eee 100%);
            border: 4px solid #00d9ff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 217, 255, 0.3);
        }
        
        /* 夜间主题 */
        #gameContainer.night {
            background: linear-gradient(to bottom, #0d0d0d 0%, #1a1a2e 100%);
        }
        
        #gameContainer.night .ground {
            background: #555;
        }
        
        #gameContainer.night .score, 
        #gameContainer.night .highScore {
            color: #888;
        }
        
        #gameContainer.night .cloud {
            background: #333;
        }
        
        .ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 2px;
            background: #535353;
        }
        
        .ground::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: repeating-linear-gradient(90deg, #535353 0px, #535353 20px, transparent 20px, transparent 40px);
        }
        
        #dino {
            position: absolute;
            bottom: 0;
            left: 50px;
            width: 44px;
            height: 47px;
            z-index: 10;
            cursor: pointer;
        }
        
        #dino.running svg {
            animation: dinoRun 0.3s steps(2) infinite;
        }
        
        @keyframes dinoRun {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-2px); }
        }
        
        .jump {
            animation: jump 0.5s ease-in-out;
        }
        
        @keyframes jump {
            0% { bottom: 0; }
            50% { bottom: 130px; }
            100% { bottom: 0; }
        }
        
        .obstacle {
            position: absolute;
            bottom: 0;
            z-index: 5;
        }
        
        /* 仙人掌变体 */
        .obstacle.cactus-small {
            width: 20px;
            height: 35px;
        }
        
        .obstacle.cactus-medium {
            width: 25px;
            height: 50px;
        }
        
        .obstacle.cactus-large {
            width: 30px;
            height: 65px;
        }
        
        .obstacle.cactus-group {
            width: 45px;
            height: 50px;
        }
        
        /* 翼龙 */
        .obstacle.pterodactyl {
            bottom: 60px !important;
        }
        
        .obstacle.pterodactyl-high {
            bottom: 100px !important;
        }
        
        /* 金币 */
        .coin {
            position: absolute;
            width: 20px;
            height: 20px;
            z-index: 8;
            animation: spin 0.5s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }
        
        .score, .highScore {
            position: absolute;
            font-size: 12px;
            color: #535353;
        }
        
        .score {
            top: 10px;
            right: 20px;
        }
        
        .highScore {
            top: 10px;
            left: 20px;
        }
        
        #coins {
            position: absolute;
            top: 30px;
            right: 20px;
            font-size: 12px;
            color: #FFD700;
        }
        
        #gameOver, #startScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 100;
        }
        
        #gameOver {
            display: none;
        }
        
        #gameOver h2, #startScreen h2 {
            color: #535353;
            font-size: 20px;
            margin-bottom: 15px;
        }
        
        #gameContainer.night #gameOver h2,
        #gameContainer.night #startScreen h2 {
            color: #888;
        }
        
        #gameOver p, #startScreen p {
            color: #888;
            font-size: 10px;
            margin-top: 10px;
        }
        
        .btn {
            background: #00d9ff;
            color: #1a1a2e;
            border: none;
            padding: 15px 30px;
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 20px;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background: #00b8d4;
            transform: scale(1.05);
        }
        
        #instructions {
            color: #fff;
            margin-top: 20px;
            font-size: 10px;
            text-align: center;
        }
        
        .cloud {
            position: absolute;
            width: 60px;
            height: 20px;
            background: #e0e0e0;
            border-radius: 10px;
            opacity: 0.6;
            z-index: 1;
        }
        
        .cloud::after {
            content: '';
            position: absolute;
            width: 25px;
            height: 25px;
            background: inherit;
            border-radius: 50%;
            top: -12px;
            left: 10px;
        }
        
        .cloud::before {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            background: inherit;
            border-radius: 50%;
            top: -8px;
            left: 30px;
        }
        
        #controls {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 50;
        }
        
        #controls button {
            background: #00d9ff;
            border: none;
            padding: 8px 15px;
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            cursor: pointer;
            border-radius: 3px;
            color: #1a1a2e;
        }
        
        #controls button:hover {
            background: #00b8d4;
        }
        
        /* 星星效果 */
        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #FFD700;
            border-radius: 50%;
            animation: twinkle 1s infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        
        /* 游戏进行中的UI */
        #gameUI {
            display: none;
        }
        
        /* 标题 */
        .title {
            font-size: 28px;
            margin-bottom: 30px;
            color: #00d9ff;
            text-shadow: 0 0 20px rgba(0, 217, 255, 0.5);
        }
    </style>
</head>
<body>
    <h1 class="title">🦕 恐龙跑酷</h1>
    
    <div id="gameContainer">
        <div class="ground"></div>
        
        <div id="gameUI">
            <div class="highScore">最高分: 0</div>
            <div class="score">得分: 0</div>
            <div id="coins">金币: 0 🪙</div>
        </div>
        
        <div id="startScreen">
            <h2>🦕 恐龙跑酷</h2>
            <button class="btn" onclick="startGame()">开始游戏</button>
            <p>按空格键或点击跳跃</p>
            <p style="margin-top: 20px;">收集金币得分翻倍!</p>
        </div>
        
        <div id="gameOver">
            <h2>游戏结束!</h2>
            <p id="finalScore">得分: 0</p>
            <p id="finalCoins" style="color: #FFD700;">金币: 0</p>
            <button class="btn" onclick="startGame()">再玩一次</button>
        </div>
        
        <div id="dino" class="running">
            <svg viewBox="0 0 44 47" xmlns="http://www.w3.org/2000/svg">
                <ellipse cx="22" cy="30" rx="18" ry="14" fill="#535353"/>
                <ellipse cx="38" cy="18" rx="10" ry="8" fill="#535353"/>
                <circle cx="40" cy="15" r="2" fill="#fff"/>
                <rect x="12" y="40" width="6" height="12" fill="#535353" rx="2"/>
                <rect x="26" y="40" width="6" height="12" fill="#535353" rx="2"/>
                <path d="M4 28 Q-5 25 2 35" stroke="#535353" stroke-width="4" fill="none"/>
                <rect x="30" y="32" width="8" height="3" fill="#535353" rx="1"/>
            </svg>
        </div>
        
        <div id="controls">
            <button onclick="toggleTheme()" id="themeBtn">🌙 夜间</button>
            <button onclick="toggleSound()" id="soundBtn">🔊 音效</button>
        </div>
    </div>
    
    <div id="instructions">
        <p>空格键 / 点击屏幕 / 点击恐龙 跳跃 | 收集金币得分翻倍</p>
    </div>

    <script>
        const dino = document.getElementById('dino');
        const gameContainer = document.getElementById('gameContainer');
        const scoreElement = document.querySelector('.score');
        const highScoreElement = document.querySelector('.highScore');
        const coinsElement = document.getElementById('coins');
        const gameOverScreen = document.getElementById('gameOver');
        const startScreen = document.getElementById('startScreen');
        const gameUI = document.getElementById('gameUI');
        const finalScoreElement = document.getElementById('finalScore');
        const finalCoinsElement = document.getElementById('finalCoins');
        
        let isJumping = false;
        let isGameOver = false;
        let score = 0;
        let coins = 0;
        let highScore = parseInt(localStorage.getItem('dinoHighScore')) || 0;
        let gameSpeed = 6;
        let obstacleInterval;
        let scoreInterval;
        let gameRunning = false;
        let obstacles = [];
        let clouds = [];
        let coinItems = [];
        let stars = [];
        let isNight = false;
        let soundEnabled = true;
        let audioCtx = null;
        
        highScoreElement.textContent = `最高分: ${highScore}`;
        
        // 音效系统
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        
        function playSound(type) {
            if (!soundEnabled || !audioCtx) return;
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            switch(type) {
                case 'jump':
                    oscillator.frequency.setValueAtTime(400, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
                    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.1);
                    break;
                case 'coin':
                    oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
                    oscillator.frequency.setValueAtTime(1000, audioCtx.currentTime + 0.05);
                    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.15);
                    break;
                case 'gameover':
                    oscillator.frequency.setValueAtTime(300, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
                    gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.3);
                    break;
            }
        }
        
        function jump() {
            if (isJumping || isGameOver || !gameRunning) return;
            
            isJumping = true;
            dino.classList.add('jump');
            playSound('jump');
            
            setTimeout(() => {
                dino.classList.remove('jump');
                isJumping = false;
            }, 500);
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (!gameRunning && !isGameOver) {
                    startGame();
                } else if (isGameOver) {
                    startGame();
                } else {
                    jump();
                }
            }
        });
        
        gameContainer.addEventListener('click', (e) => {
            if (e.target.tagName !== 'BUTTON') {
                if (!gameRunning && !isGameOver) {
                    startGame();
                } else if (isGameOver) {
                    startGame();
                } else {
                    jump();
                }
            }
        });
        
        dino.addEventListener('click', (e) => {
            e.stopPropagation();
            jump();
        });
        
        function createCactus() {
            const types = ['cactus-small', 'cactus-medium', 'cactus-large', 'cactus-group'];
            const type = types[Math.floor(Math.random() * types.length)];
            
            const obstacle = document.createElement('div');
            obstacle.classList.add('obstacle', 'cactus', type);
            
            // 仙人掌 SVG
            let svg = '';
            if (type === 'cactus-small') {
                svg = `<svg viewBox="0 0 20 35"><rect x="7" y="0" width="6" height="35" rx="3" fill="#2d5a27"/><rect x="0" y="10" width="7" height="4" rx="2" fill="#2d5a27"/><rect x="13" y="8" width="7" height="4" rx="2" fill="#2d5a27"/><rect x="0" y="20" width="5" height="3" rx="1" fill="#2d5a27"/><rect x="15" y="22" width="5" height="3" rx="1" fill="#2d5a27"/></svg>`;
            } else if (type === 'cactus-medium') {
                svg = `<svg viewBox="0 0 25 50"><rect x="8" y="0" width="9" height="50" rx="4" fill="#2d5a27"/><rect x="0" y="15" width="10" height="5" rx="2" fill="#2d5a27"/><rect x="15" y="12" width="10" height="5" rx="2" fill="#2d5a27"/><rect x="0" y="30" width="7" height="4" rx="2" fill="#2d5a27"/><rect x="18" y="32" width="7" height="4" rx="2" fill="#2d5a27"/></svg>`;
            } else if (type === 'cactus-large') {
                svg = `<svg viewBox="0 0 30 65"><rect x="10" y="0" width="10" height="65" rx="5" fill="#1a3d15"/><rect x="0" y="18" width="12" height="6" rx="3" fill="#1a3d15"/><rect x="18" y="15" width="12" height="6" rx="3" fill="#1a3d15"/><rect x="0" y="38" width="8" height="5" rx="2" fill="#1a3d15"/><rect x="22" y="40" width="8" height="5" rx="2" fill="#1a3d15"/><rect x="3" y="55" width="6" height="4" rx="2" fill="#1a3d15"/></svg>`;
            } else {
                svg = `<svg viewBox="0 0 45 50"><rect x="5" y="20" width="8" height="30" rx="3" fill="#2d5a27"/><rect x="18" y="10" width="8" height="40" rx="3" fill="#2d5a27"/><rect x="32" y="25" width="8" height="25" rx="3" fill="#2d5a27"/><rect x="0" y="25" width="6" height="4" rx="2" fill="#2d5a27"/><rect x="40" y="30" width="5" height="3" rx="1" fill="#2d5a27"/></svg>`;
            }
            
            obstacle.innerHTML = svg;
            obstacle.style.left = '800px';
            gameContainer.appendChild(obstacle);
            obstacles.push(obstacle);
        }
        
        function createPterodactyl() {
            const isHigh = Math.random() > 0.5;
            const obstacle = document.createElement('div');
            obstacle.classList.add('obstacle', 'pterodactyl');
            if (isHigh) obstacle.classList.add('pterodactyl-high');
            
            obstacle.innerHTML = `
                <svg viewBox="0 0 40 30">
                    <ellipse cx="20" cy="15" rx="18" ry="10" fill="#8B4513"/>
                    <circle cx="32" cy="12" r="3" fill="#000"/>
                    <circle cx="33" cy="11" r="1" fill="#fff"/>
                    <path d="M5 15 L-8 8 L-8 22 Z" fill="#8B4513"/>
                    <path d="M10 22 L5 30 L18 24 Z" fill="#8B4513"/>
                    <path d="M25 22 L30 30 L20 24 Z" fill="#8B4513"/>
                </svg>
            `;
            
            obstacle.style.left = '800px';
            gameContainer.appendChild(obstacle);
            obstacles.push(obstacle);
        }
        
        function createCoin() {
            const coin = document.createElement('div');
            coin.classList.add('coin');
            const bottom = 40 + Math.random() * 80;
            coin.style.bottom = bottom + 'px';
            coin.style.left = '800px';
            
            coin.innerHTML = `
                <svg viewBox="0 0 20 20">
                    <circle cx="10" cy="10" r="9" fill="#FFD700" stroke="#B8860B" stroke-width="2"/>
                    <text x="10" y="14" text-anchor="middle" font-size="10" fill="#B8860B" font-family="Arial">$</text>
                </svg>
            `;
            
            gameContainer.appendChild(coin);
            coinItems.push(coin);
        }
        
        function createCloud() {
            const cloud = document.createElement('div');
            cloud.classList.add('cloud');
            cloud.style.top = (20 + Math.random() * 100) + 'px';
            cloud.style.left = '800px';
            gameContainer.appendChild(cloud);
            clouds.push(cloud);
        }
        
        function createStars() {
            if (!isNight) return;
            for (let i = 0; i < 10; i++) {
                setTimeout(() => {
                    if (isNight && !isGameOver) {
                        const star = document.createElement('div');
                        star.classList.add('star');
                        star.style.left = Math.random() * 800 + 'px';
                        star.style.top = Math.random() * 150 + 'px';
                        gameContainer.appendChild(star);
                        stars.push(star);
                    }
                }, i * 500);
            }
        }
        
        function moveObstacles() {
            if (isGameOver) return;
            
            obstacles.forEach((obstacle, index) => {
                let left = parseInt(obstacle.style.left) || 800;
                left -= gameSpeed;
                obstacle.style.left = left + 'px';
                
                // 碰撞检测
                const dinoLeft = 50;
                const dinoRight = 50 + 40;
                const dinoBottom = isJumping ? 130 : 0;
                const dinoTop = 47 + dinoBottom;
                
                const obsLeft = left;
                const obsRight = left + (obstacle.classList.contains('pterodactyl') ? 40 : 
                                       obstacle.classList.contains('cactus-small') ? 20 :
                                       obstacle.classList.contains('cactus-large') ? 30 : 45);
                const obsBottom = obstacle.classList.contains('pterodactyl') ? (obstacle.classList.contains('pterodactyl-high') ? 100 : 60) : 0;
                const obsTop = obsBottom + (obstacle.classList.contains('pterodactyl') ? 30 : 
                                          obstacle.classList.contains('cactus-small') ? 35 :
                                          obstacle.classList.contains('cactus-large') ? 65 : 50);
                
                if (obsLeft < dinoRight && obsRight > dinoLeft && 
                    obsBottom < dinoTop && obsTop > dinoBottom) {
                    gameOver();
                }
                
                if (left < -50) {
                    obstacle.remove();
                    obstacles.splice(index, 1);
                }
            });
            
            // 金币收集
            coinItems.forEach((coin, index) => {
                let left = parseInt(coin.style.left) || 800;
                left -= gameSpeed;
                coin.style.left = left + 'px';
                
                const dinoLeft = 50;
                const dinoRight = 50 + 40;
                const dinoBottom = isJumping ? 130 : 0;
                const dinoTop = 47 + dinoBottom;
                const coinBottom = parseInt(coin.style.bottom) || 40;
                const coinTop = coinBottom + 20;
                
                if (left < dinoRight && left + 20 > dinoLeft && 
                    coinBottom < dinoTop && coinTop > dinoBottom) {
                    // 收集金币
                    coin.remove();
                    coinItems.splice(index, 1);
                    coins++;
                    coinsElement.textContent = `金币: ${coins} 🪙`;
                    playSound('coin');
                }
                
                if (left < -20) {
                    coin.remove();
                    coinItems.splice(index, 1);
                }
            });
            
            clouds.forEach((cloud, index) => {
                let left = parseInt(cloud.style.left) || 800;
                left -= gameSpeed * 0.3;
                cloud.style.left = left + 'px';
                
                if (left < -70) {
                    cloud.remove();
                    clouds.splice(index, 1);
                }
            });
        }
        
        function updateScore() {
            score++;
            const totalScore = score + coins * 10;
            scoreElement.textContent = `得分: ${totalScore}`;
            
            // 加快速度
            if (score % 100 === 0) {
                gameSpeed = Math.min(gameSpeed + 0.5, 15);
            }
        }
        
        function gameOver() {
            isGameOver = true;
            gameRunning = false;
            clearInterval(obstacleInterval);
            clearInterval(scoreInterval);
            
            const totalScore = score + coins * 10;
            
            if (totalScore > highScore) {
                highScore = totalScore;
                localStorage.setItem('dinoHighScore', highScore);
                highScoreElement.textContent = `最高分: ${highScore}`;
            }
            
            finalScoreElement.textContent = `得分: ${totalScore}`;
            finalCoinsElement.textContent = `金币: ${coins}`;
            gameOverScreen.style.display = 'block';
            playSound('gameover');
        }
        
        function startGame() {
            initAudio();
            
            isGameOver = false;
            gameRunning = true;
            score = 0;
            coins = 0;
            gameSpeed = 6;
            
            scoreElement.textContent = '得分: 0';
            coinsElement.textContent = '金币: 0 🪙';
            
            obstacles.forEach(o => o.remove());
            clouds.forEach(c => c.remove());
            coinItems.forEach(c => c.remove());
            stars.forEach(s => s.remove());
            obstacles = [];
            clouds = [];
            coinItems = [];
            stars = [];
            
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            gameUI.style.display = 'block';
            
            // 创建初始云朵
            for (let i = 0; i < 3; i++) {
                setTimeout(() => createCloud(), i * 1500);
            }
            
            // 生成障碍物
            obstacleInterval = setInterval(() => {
                if (Math.random() > 0.7) {
                    createPterodactyl();
                } else {
                    createCactus();
                }
                
                // 随机生成金币
                if (Math.random() > 0.5) {
                    createCoin();
                }
                
                clearInterval(obstacleInterval);
                obstacleInterval = setInterval(() => {
                    if (Math.random() > 0.7) {
                        createPterodactyl();
                    } else {
                        createCactus();
                    }
                    if (Math.random() > 0.5) {
                        createCoin();
                    }
                }, Math.max(1500 - gameSpeed * 50, 800));
            }, 1500);
            
            // 游戏循环
            scoreInterval = setInterval(() => {
                moveObstacles();
                updateScore();
            }, 100);
            
            // 云朵持续生成
            setInterval(() => {
                if (!isGameOver) createCloud();
            }, 2500);
            
            // 夜间星星
            if (isNight) {
                createStars();
            }
        }
        
        function toggleTheme() {
            isNight = !isNight;
            gameContainer.classList.toggle('night', isNight);
            document.getElementById('themeBtn').textContent = isNight ? '☀️ 白天' : '🌙 夜间';
            
            if (isNight && gameRunning) {
                createStars();
            }
        }
        
        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('soundBtn').textContent = soundEnabled ? '🔊 音效' : '🔇 静音';
        }
    </script>
</body>
</html>
