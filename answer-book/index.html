<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📖 答案之书</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            color: #fff;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        .subtitle {
            color: #8899aa;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .input-area {
            width: 100%;
            max-width: 500px;
            margin-bottom: 25px;
        }

        .question-input {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.1rem;
            border: 2px solid #667eea;
            border-radius: 15px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            outline: none;
            transition: all 0.3s;
        }

        .question-input::placeholder {
            color: #8899aa;
        }

        .question-input:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0,212,255,0.3);
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
            max-width: 600px;
        }

        .tag {
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            color: #aaa;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tag:hover {
            background: rgba(102,126,234,0.3);
            border-color: #667eea;
            color: #fff;
        }

        .tag.selected {
            background: #667eea;
            border-color: #667eea;
            color: #fff;
        }

        .answer-box {
            width: 350px;
            min-height: 180px;
            background: linear-gradient(145deg, #f5f0e6, #e8e0d0);
            border-radius: 20px;
            padding: 30px;
            display: flex;
            align-items: center;
            justify-content:-bottom: 30 center;
            marginpx;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        .answer-box::before {
            content: '📖';
            position: absolute;
            top: 10px;
            left: 15px;
            font-size: 1.5rem;
            opacity: 0.3;
        }

        .answer {
            font-size: 1.5rem;
            color: #333;
            text-align: center;
            line-height: 1.8;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.5s ease;
        }

        .answer.show {
            opacity: 1;
            transform: scale(1);
        }

        .answer-hint {
            color: #999;
            font-size: 1rem;
        }

        .btn {
            padding: 15px 60px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(145deg, #667eea, #764ba2);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #667eea;
            text-decoration: none;
            font-size: 1rem;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            transition: all 0.3s;
        }

        .back-link:hover {
            background: rgba(255,255,255,0.2);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .answer-box.shake {
            animation: shake 0.3s ease-in-out;
        }
    </style>
</head>
<body>
    <a href="../" class="back-link">← 返回游戏列表</a>
    
    <h1>📖 答案之书</h1>
    <p class="subtitle">心中默念你的问题，然后点击获取答案</p>
    
    <div class="input-area">
        <input type="text" class="question-input" id="questionInput" placeholder="在这里输入你的问题..." maxlength="50">
    </div>

    <div class="tags">
        <div class="tag" onclick="selectTag(this)">我应该表白吗？</div>
        <div class="tag" onclick="selectTag(this)">要不要辞职？</div>
        <div class="tag" onclick="selectTag(this)">该买房吗？</div>
        <div class="tag" onclick="selectTag(this)">要不要分手？</div>
        <div class="tag" onclick="selectTag(this)">要去旅行吗？</div>
        <div class="tag" onclick="selectTag(this)">要不要创业？</div>
        <div class="tag" onclick="selectTag(this)">该学什么？</div>
        <div class="tag" onclick="selectTag(this)">要不要跳槽？</div>
    </div>

    <div class="answer-box" id="answerBox">
        <div class="answer" id="answer">
            <span class="answer-hint">点击按钮获取答案</span>
        </div>
    </div>

    <button class="btn" id="btn" onclick="getAnswer()">🔮 寻求答案</button>

    <script>
        const answers = [
            "是的，去做吧！",
            "不是，现在还不是时候",
            "再等等，机会还没到",
            "相信自己，你可以的！",
            "不要犹豫，勇敢行动",
            "慎重考虑再做决定",
            "这是一个好主意",
            "建议换个方向试试",
            "命运的安排就是这样",
            "跟着直觉走",
            "耐心等待会有好结果",
            "是时候改变了",
            "保持现状也不错",
            "你需要更多准备",
            "机不可失，时不再来",
            "三思而后行",
            "随心而动",
            "顺其自然吧",
            "值得一试！",
            "别着急，慢慢来",
            "这是命中注定的",
            "或许可以问问别人",
            "相信你的选择",
            "时间会给出答案",
            "把握当下最重要",
            "不要后悔你的决定",
            "这是最好的选择",
            "成败在此一举",
            "一切都会好起来的",
            "遵循内心深处的声音",
            "你心里已经有答案了",
            "是时候迈出第一步了",
            "保持乐观的心态",
            "失败是成功之母",
            "不要轻易放弃",
            "听从内心的选择",
            "现在就是最好的时机"
        ];

        let lastAnswer = '';

        function selectTag(element) {
            // 取消其他选中状态
            document.querySelectorAll('.tag').forEach(tag => tag.classList.remove('selected'));
            // 选中当前
            element.classList.add('selected');
            // 填入输入框
            document.getElementById('questionInput').value = element.textContent;
        }

        function getAnswer() {
            const question = document.getElementById('questionInput').value.trim();
            const answerBox = document.getElementById('answerBox');
            const answer = document.getElementById('answer');
            const btn = document.getElementById('btn');

            // 摇晃动画
            answerBox.classList.add('shake');
            setTimeout(() => answerBox.classList.remove('shake'), 300);

            // 随机选择答案（不重复）
            let newAnswer;
            do {
                newAnswer = answers[Math.floor(Math.random() * answers.length)];
            } while (newAnswer === lastAnswer && answers.length > 1);
            lastAnswer = newAnswer;

            // 显示答案
            setTimeout(() => {
                answer.classList.remove('show');
                setTimeout(() => {
                    answer.innerHTML = newAnswer;
                    answer.classList.add('show');
                }, 200);
            }, 300);

            // 按钮状态
            btn.disabled = true;
            btn.textContent = '再问一次';

            setTimeout(() => {
                btn.disabled = false;
            }, 1500);
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            const answer = document.getElementById('answer');
            setTimeout(() => answer.classList.add('show'), 500);
        });

        // 回车也能获取答案
        document.getElementById('questionInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                getAnswer();
            }
        });
    </script>
</body>
</html>
